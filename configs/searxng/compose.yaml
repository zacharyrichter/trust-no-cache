services:
  searxng-redis:
    container_name: searxng-redis
    image: docker.io/valkey/valkey:8-alpine
    command: valkey-server --save 30 1 --loglevel warning
    restart: unless-stopped
    networks:
      - searxng
    volumes:
      - valkey-data:/data
    cap_drop:
      - ALL
    cap_add:
      - SETGID
      - SETUID
      - DAC_OVERRIDE
    logging:
      driver: json-file
      options:
        max-size: 1m
        max-file: "1"
    mem_limit: 128m
    memswap_limit: 192m

  searxng:
    container_name: searxng
    image: docker.io/searxng/searxng:latest
    restart: unless-stopped
    networks:
      - proxy-net
      - searxng
    volumes:
      - ./settings:/etc/searxng:rw
    environment:
      - SEARXNG_BASE_URL=https://search.yourdomain.org
      - UWSGI_WORKERS=2
      - UWSGI_THREADS=2
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    logging:
      driver: json-file
      options:
        max-size: 1m
        max-file: "1"
    mem_limit: 512m
    memswap_limit: 640m

networks:
  proxy-net:
    external: true
    name: proxy-net
  searxng:

volumes:
  valkey-data:
